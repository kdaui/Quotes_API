<!DOCTYPE html>
<html>

<head>
    <title>Quotes Database Frontend ig</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#5E8ABF" />
    <style>
        :root {
            --primary-dark: #0A0F1C;
            --secondary-dark: #141928;
            --tertiary-dark: #1C2333;
            --primary-blue: #1B3A5F;
            --secondary-blue: #2C4E7C;
            --accent-blue: #3D6299;
            --light-accent: #5E8ABF;
            --text-primary: #B8C5D6;
            --text-secondary: #8A9BB3;
            --accent-red: #8B2635;
            --border-color: #2A3F5F;
        }

        body {
            background: var(--primary-dark);
            color: var(--text-primary);
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .quote-box {
            max-width: 600px;
            padding: 20px;
            border: 2px solid #ff3e3e;
            margin-bottom: 20px;
        }

        button {
            background: #ff3e3e;
            color: var(--text-primary);
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: white;
        }

        .site-footer {
            text-align: center;
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <div class="quote-box">
        <h1 id="quote">"Loading..."</h1>
        <p id="author">- ???</p>
    </div>
    <button onclick="getQuote()">GET NEW QUOTE</button>

    <script>
async function getQuote() {
    const API_URL = 'https://quotes-api-pink.vercel.app/api/random';
    
    try {
        console.log("Attempting to fetch from:", API_URL);
        const response = await fetch(API_URL);
        
        if (!response.ok) {
            const errorBody = await response.text();
            throw new Error(`Server Error ${response.status}: ${errorBody}`);
        }

        const data = await response.json();
        console.log("Data received successfully:", data);
        document.getElementById('quote').innerText = `"${data.text || data.quote || 'No text found'}"`;
        document.getElementById('author').innerText = `- ${data.character || data.author || 'Unknown'}`;

    } catch (error) {
        console.error("Detailed Error:", error);
        document.getElementById('quote').innerText = "Could not connect to the database.";
        document.getElementById('author').innerText = "Check console for details.";
    }
}

getQuote();
    </script>
    
    <footer>
        <p>"God's in his heaven. All's right with the world." - NERV</p>
    </footer>
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/Quotes_API/sw.js').then(() => {});
        }
    </script>
</body>

</html>
