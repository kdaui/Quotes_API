<!DOCTYPE html>
<html>

<head>
    <title>Quotes Database</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#5E8ABF" />
    <style>
        :root {
            --primary-dark: #0A0F1C;
            --secondary-dark: #141928;
            --tertiary-dark: #1C2333;
            --primary-blue: #1B3A5F;
            --secondary-blue: #2C4E7C;
            --accent-blue: #3D6299;
            --light-accent: #5E8ABF;
            --text-primary: #B8C5D6;
            --text-secondary: #8A9BB3;
            --accent-red: #8B2635;
            --border-color: #2A3F5F;
        }

        body {
            background: var(--primary-dark);
            color: var(--text-primary);
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .quote-box {
            max-width: 600px;
            padding: 20px;
            border: 2px solid #ff3e3e;
            margin-bottom: 20px;
        }

        button {
            background: #ff3e3e;
            color: var(--text-primary);
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: white;
        }

        .site-footer {
            text-align: center;
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <div class="quote-box">
        <h1 id="quote">"Loading..."</h1>
        <p id="author">- ???</p>
    </div>
    <button onclick="getQuote()">GET NEW QUOTE</button>

    <div style="height: 20px;"></div>
    <button onclick="document.getElementById('submit-form').style.display='block'" style="background:#333;font-size:12px;margin-top:15px;">SUBMIT A QUOTE</button>

    <div id="submit-form" style="display:none;margin-top:20px;text-align:left;max-width:400px;">
        <h3>Submit a Quote</h3>
        <input type="text" id="quote-text" placeholder="Quote" style="width:100%;padding:8px;margin-bottom:10px;background:#1C2333;color:#B8C5D6;border:1px solid #2A3F5F;">
        <input type="text" id="quote-author" placeholder="Character / Person" style="width:100%;padding:8px;margin-bottom:10px;background:#1C2333;color:#B8C5D6;border:1px solid #2A3F5F;">
        <button onclick="submitQuote()" style="width:100%;">SUBMIT</button>
        <p id="submit-msg" style="margin-top:10px;"></p>

    </div>

    <script>
async function getQuote() {
    const API_URL = 'https://quotes-api-pink.vercel.app/api/random';
    
    try {
        console.log("Attempting to fetch from:", API_URL);
        const response = await fetch(API_URL);
        
        if (!response.ok) {
            const errorBody = await response.text();
            throw new Error(`Server Error ${response.status}: ${errorBody}`);
        }

        const data = await response.json();
        console.log("Data received successfully:", data);
        document.getElementById('quote').innerText = `"${data.text || data.quote || 'No text found'}"`;
        document.getElementById('author').innerText = `- ${data.character || data.author || 'Unknown'}`;

    } catch (error) {
        console.error("Detailed Error:", error);
        document.getElementById('quote').innerText = "Could not connect to the database.";
        document.getElementById('author').innerText = "Check console for details.";
    }
}

getQuote();

function submitQuote() {
    const text = document.getElementById('quote-text').value.trim();
    const author = document.getElementById('quote-author').value.trim();
    
    if (!text || !author) {
        document.getElementById('submit-msg').innerText = 'Please fill in both fields';
        return;
    }
    
    const title = `Quote: ${text.substring(0, 50)}${text.length > 50 ? '...' : ''}`;
    const body = `**Quote:** ${text}\n\n**Character:** ${author}`;
    window.open(`https://github.com/kdaui/Quotes_API/issues/new?title=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}`, '_blank');
    
    document.getElementById('submit-msg').innerText = 'Thanks! Your email app should open.';
    document.getElementById('quote-text').value = '';
    document.getElementById('quote-author').value = '';
}
    </script>
</body>

</html>
